<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevino DB Schema — Saturn Data Layer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a14; overflow: hidden; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; }
    #canvas { width: 100vw; height: 100vh; cursor: default; display: block; }
    #legend {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(10,10,20,0.94); padding: 12px 16px; border-radius: 10px;
      border: 1px solid #1a1f2e; display: flex; gap: 6px; flex-wrap: wrap; max-width: 780px;
      backdrop-filter: blur(14px);
    }
    #legend .lbl { color: #555b6e; font-size: 10px; align-self: center; margin-right: 6px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px; font-size: 9.5px;
      padding: 3px 9px; border-radius: 5px; font-weight: 500;
    }
    .dot { width: 7px; height: 7px; border-radius: 2px; display: inline-block; }
    #legend-lines {
      position: fixed; top: 56px; left: 16px; z-index: 10;
      background: rgba(10,10,20,0.94); padding: 8px 14px; border-radius: 8px;
      border: 1px solid #1a1f2e; display: flex; gap: 16px; flex-wrap: wrap;
      backdrop-filter: blur(14px);
    }
    #legend-lines .ll { display: flex; align-items: center; gap: 6px; font-size: 9px; color: #555b6e; }
    #legend-lines .ll svg { width: 32px; height: 10px; }
    #controls {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      background: rgba(10,10,20,0.94); padding: 14px 18px; border-radius: 10px;
      border: 1px solid #1a1f2e; display: flex; flex-direction: column; gap: 8px; align-items: center;
      backdrop-filter: blur(14px);
    }
    #controls .title { color: #e5e7eb; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; }
    #controls .sub { color: #555b6e; font-size: 10px; }
    #controls .hint { color: #3a3f4e; font-size: 8.5px; margin-top: 2px; }
    #btn-row { display: flex; gap: 5px; }
    #btn-row button {
      background: #111522; border: 1px solid #1e2536; color: #8892a4; border-radius: 5px;
      cursor: pointer; font-family: inherit; height: 30px; transition: all 0.15s;
    }
    #btn-row button:hover { border-color: #3a4560; color: #e5e7eb; background: #161d2e; }
    #bp, #bm { width: 30px; font-size: 15px; }
    #br { padding: 0 10px; font-size: 9px; letter-spacing: 0.3px; }
    #search-box {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
      background: rgba(10,10,20,0.94); padding: 8px 14px; border-radius: 10px;
      border: 1px solid #1a1f2e; display: flex; gap: 8px; align-items: center;
      backdrop-filter: blur(14px);
    }
    #search-box input {
      background: #0e1119; border: 1px solid #1e2536; color: #e5e7eb; border-radius: 5px;
      padding: 5px 10px; font-family: inherit; font-size: 11px; width: 240px; outline: none;
    }
    #search-box input::placeholder { color: #3a3f4e; }
    #search-box input:focus { border-color: #4a9eff; }
    #search-box .search-hint { color: #3a3f4e; font-size: 9px; }
    .tbl { transition: opacity 0.3s ease, filter 0.3s ease; }
    .tbl-body { transition: stroke 0.3s ease, stroke-width 0.3s ease; }
    .rel-line { transition: opacity 0.3s ease, stroke 0.3s ease, stroke-width 0.3s ease; }
    .rel-dot { transition: opacity 0.3s ease, fill 0.3s ease; }
  </style>
</head>
<body>
<div id="legend"><span class="lbl">Domains</span></div>
<div id="legend-lines">
  <span class="ll">
    <svg><line x1="0" y1="5" x2="32" y2="5" stroke="#6b7280" stroke-width="1.5"/></svg>
    Required FK
  </span>
  <span class="ll">
    <svg><line x1="0" y1="5" x2="32" y2="5" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5 3"/></svg>
    Nullable FK
  </span>
  <span class="ll" style="color:#fbbf24;">1:1</span> = one-to-one
  <span class="ll" style="color:#60a5fa;">1:M</span> = one-to-many
</div>
<div id="controls">
  <span class="title">SATURN ERD</span>
  <span class="sub" id="stats"></span>
  <div id="btn-row">
    <button id="bp">+</button>
    <button id="bm">−</button>
    <button id="br">reset</button>
  </div>
  <span class="hint">scroll to zoom · drag tables · drag canvas</span>
</div>
<div id="search-box">
  <input type="text" id="search" placeholder="Search tables or columns..." />
  <span class="search-hint">ESC to clear</span>
</div>
<svg id="canvas"></svg>

  accounts: "#f59e0b",
  radar:    "#a78bfa",
  ai:       "#34d399",
  trading:  "#f472b6",

  accounts: "Brokerage & Funding",
  radar:    "AI Radar",
  ai:       "AI Conversations",

// ── Rendering Constants ──
const TW = 320, RH = 22, HH = 36;
const NS = "http://www.w3.org/2000/svg";

function s(tag, a={}, txt) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(a)) e.setAttribute(k, v);
  if (txt !== undefined) e.textContent = txt;
  return e;
}

// ── State ──

let dragging = null, dragOff = {x:0,y:0};
let panning = false, panStart = {x:0,y:0};
let hoverTable = null, hoverRel = -1;
let searchTerm = "";

// ── SVG Setup ──

svg.appendChild(bgR);
const defs = s("defs");
const pat = s("pattern",{id:"grid",width:40,height:40,patternUnits:"userSpaceOnUse"});
pat.appendChild(s("circle",{cx:1,cy:1,r:0.5,fill:"#12121e"}));
defs.appendChild(pat);
const glow = s("filter",{id:"glow",x:"-50%",y:"-50%",width:"200%",height:"200%"});
const gb = s("feGaussianBlur",{stdDeviation:"4",result:"blur"});
const fm = s("feMerge");
fm.appendChild(s("feMergeNode",{in:"blur"}));
fm.appendChild(s("feMergeNode",{in:"SourceGraphic"}));
glow.appendChild(gb); glow.appendChild(fm);
defs.appendChild(glow);
svg.appendChild(defs);
const gridR = s("rect",{width:"100%",height:"100%",fill:"url(#grid)"});
svg.appendChild(gridR);
const world = s("g");
svg.appendChild(world);
const linesG = s("g");
const tablesG = s("g");
world.appendChild(linesG);
world.appendChild(tablesG);

function thh(t) { return HH + t.columns.length * RH + 12; }

function getRect(key) {
  const t = TABLES[key], p = pos[key], h = thh(t);
  return { x:p.x, y:p.y, w:TW, h, cx:p.x+TW/2, cy:p.y+h/2 };
}

function bestSides(fKey, tKey) {
  const f = getRect(fKey), t = getRect(tKey);
  const dx = t.cx - f.cx, dy = t.cy - f.cy;
  const overlapX = f.x < t.x+t.w && f.x+f.w > t.x;
  const overlapY = f.y < t.y+t.h && f.y+f.h > t.y;
  if (overlapX && !overlapY) return dy>0?["bottom","top"]:["top","bottom"];
  if (overlapY && !overlapX) return dx>0?["right","left"]:["left","right"];
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (ady > adx*1.2) return dy>0?["bottom","top"]:["top","bottom"];
  return dx>0?["right","left"]:["left","right"];
}

function anchor(key, colName, side) {
  const t = TABLES[key], p = pos[key];
  const ci = t.columns.findIndex(c => c.name === colName);
  const rowY = p.y + HH + ci*RH + RH/2;
  const h = thh(t);
  if (side==="right")  return {x:p.x+TW, y:rowY};
  if (side==="left")   return {x:p.x, y:rowY};
  if (side==="bottom") return {x:p.x+TW/2, y:p.y+h};
  if (side==="top")    return {x:p.x+TW/2, y:p.y};
}

function bezier(f, t, fSide, tSide) {
  const isV = side => side==="top"||side==="bottom";
  const dist = Math.sqrt((t.x-f.x)**2+(t.y-f.y)**2);
  const cp = Math.min(Math.max(dist*0.4,50),200);
  const fcx = isV(fSide)?f.x:f.x+(fSide==="right"?cp:-cp);
  const fcy = isV(fSide)?f.y+(fSide==="bottom"?cp:-cp):f.y;
  const tcx = isV(tSide)?t.x:t.x+(tSide==="right"?cp:-cp);
  const tcy = isV(tSide)?t.y+(tSide==="bottom"?cp:-cp):t.y;
  return `M${f.x} ${f.y} C${fcx} ${fcy},${tcx} ${tcy},${t.x} ${t.y}`;
}

function midpoint(f, t) {
  return {x:(f.x+t.x)/2, y:(f.y+t.y)/2};
}

function matchesSearch(tableName, table) {
  if (!searchTerm) return true;
  const q = searchTerm.toLowerCase();
  if (tableName.toLowerCase().includes(q)) return true;
  return table.columns.some(c => c.name.toLowerCase().includes(q) || c.type.toLowerCase().includes(q));
}

// ── Build Table Elements ──
const tEls = {};
function buildTables() {
  tablesG.innerHTML = "";
  Object.entries(TABLES).forEach(([key, table]) => {
    const p = pos[key], color = DC[table.domain], h = thh(table);
    const g = s("g",{transform:`translate(${p.x},${p.y})`,class:"tbl"});

    g.appendChild(s("rect",{x:4,y:4,width:TW,height:h,rx:8,fill:"#000",opacity:0.35}));
    g.appendChild(s("rect",{x:0,y:0,width:TW,height:h,rx:8,fill:"#0e0e1a",stroke:color,"stroke-width":1.2,"stroke-opacity":0.6,class:"tbl-body"}));
    g.appendChild(s("rect",{x:0,y:0,width:TW,height:HH,rx:8,fill:color,opacity:0.1}));
    g.appendChild(s("rect",{x:0,y:HH-8,width:TW,height:8,fill:color,opacity:0.1}));
    g.appendChild(s("rect",{x:0,y:HH-1,width:TW,height:1.5,fill:color,opacity:0.3}));
    g.appendChild(s("text",{x:14,y:23,fill:color,"font-size":12.5,"font-weight":700,"font-family":"inherit"},key));
    g.appendChild(s("text",{x:TW-12,y:23,fill:color,"font-size":8.5,"text-anchor":"end",opacity:0.45,"font-family":"inherit","font-weight":500},DL[table.domain]));

    table.columns.forEach((col, ci) => {
      const cy = HH + ci*RH + RH/2 + 1;
      if (ci%2===0) g.appendChild(s("rect",{x:1,y:HH+ci*RH,width:TW-2,height:RH,fill:"#fff",opacity:0.012}));

      let badge = null, badgeColor = "#fbbf24";
      if (col.pk && col.fk) { badge = "PFK"; badgeColor = "#fb923c"; }
      else if (col.pk) { badge = "PK"; badgeColor = "#fbbf24"; }
      else if (col.fk) { badge = "FK"; badgeColor = "#60a5fa"; }

      if (badge) {
        g.appendChild(s("text",{x:13,y:cy+4,fill:badgeColor,"font-size":7,"font-family":"inherit","font-weight":700,opacity:0.85},badge));
      }

      const nameX = badge ? (badge.length > 2 ? 40 : 34) : 14;
      g.appendChild(s("text",{x:nameX,y:cy+4,fill:col.fk?"#93c5fd":"#c9cdd6","font-size":11,"font-family":"inherit"},col.name));
      g.appendChild(s("text",{x:TW-12,y:cy+4,fill:"#3e4455","font-size":9.5,"text-anchor":"end","font-family":"inherit"},col.type));
    });

    const hit = s("rect",{x:0,y:0,width:TW,height:HH,fill:"transparent",style:"cursor:grab"});
    hit.addEventListener("mousedown", e => {
      e.stopPropagation();
      dragging = key;
      dragOff.x = (e.clientX-pan.x)/zoom - pos[key].x;
      dragOff.y = (e.clientY-pan.y)/zoom - pos[key].y;
      Object.values(tEls).forEach(el => el.style.pointerEvents = "none");
    });
    g.appendChild(hit);
    g.addEventListener("mouseenter",()=>{ hoverTable=key; render(); });
    g.addEventListener("mouseleave",()=>{ hoverTable=null; render(); });
    tEls[key] = g;
    tablesG.appendChild(g);
  });
}

// ── Build Relation Lines ──
const rEls = [];
function buildLines() {
  linesG.innerHTML = "";
  rEls.length = 0;
  RELATIONS.forEach((rel, i) => {
    const fT = TABLES[rel.from], tT = TABLES[rel.to];
    if (!fT||!tT) { rEls.push(null); return; }
    const g = s("g");
    const path = s("path",{fill:"none",stroke:DC[fT.domain],"stroke-width":1.2,opacity:0.5,class:"rel-line"});
    if (rel.style==="dashed") path.setAttribute("stroke-dasharray","6 3");
    const dot  = s("circle",{r:3.5,fill:DC[tT.domain],opacity:0.7,class:"rel-dot"});

    // Cardinality label
    const cardColor = (rel.card && rel.card.includes("1:1")) ? "#fbbf24" : "#60a5fa";
    const cardLbl = s("text",{fill:cardColor,"font-size":9.5,"text-anchor":"middle",
      "font-family":"inherit","font-weight":700,opacity:0},rel.card||"");
    const cardBg = s("rect",{fill:"#0a0a14",rx:3,opacity:0,style:"pointer-events:none"});

    // Hover tooltip
    const lbl  = s("text",{fill:"#e5e7eb","font-size":10,"text-anchor":"middle",
      "font-family":"inherit",style:"pointer-events:none",visibility:"hidden"},
      `${rel.from}.${rel.fCol} → ${rel.to}.${rel.tCol}`);
    const lblBg = s("rect",{fill:"#0a0a14",rx:4,opacity:0.92,style:"pointer-events:none",visibility:"hidden"});
    const hitPath = s("path",{fill:"none",stroke:"transparent","stroke-width":18});
    hitPath.addEventListener("mouseenter",()=>{ hoverRel=i; render(); });
    hitPath.addEventListener("mouseleave",()=>{ hoverRel=-1; render(); });
    g.append(path,dot,cardBg,cardLbl,lblBg,lbl,hitPath);
    linesG.appendChild(g);
    rEls.push({path,dot,lbl,lblBg,hit:hitPath,cardLbl,cardBg,rel,fc:DC[fT.domain],tc:DC[tT.domain],isDashed:!!rel.style});
  });
}

function render() {
  world.setAttribute("transform",`translate(${pan.x},${pan.y}) scale(${zoom})`);

  const conn = new Set();
  if (hoverTable) {
    conn.add(hoverTable);
    RELATIONS.forEach(r=>{
      if(r.from===hoverTable) conn.add(r.to);
      if(r.to===hoverTable) conn.add(r.from);
    });
  }

  const searchMatches = new Set();
  if (searchTerm) {
    Object.entries(TABLES).forEach(([k,t])=>{ if (matchesSearch(k,t)) searchMatches.add(k); });
  }

  Object.entries(tEls).forEach(([key,g]) => {
    g.setAttribute("transform",`translate(${pos[key].x},${pos[key].y})`);
    const dimmedHover = hoverTable && !conn.has(key);
    const dimmedSearch = searchTerm && !searchMatches.has(key);
    const dimmed = dimmedHover || dimmedSearch;
    g.style.opacity = dimmed ? 0.06 : 1;
    const rects = g.querySelectorAll("rect");
    const bg = rects[1];
    if (bg) {
      bg.style.stroke = hoverTable===key?"#fff":DC[TABLES[key].domain];
      bg.style.strokeWidth = hoverTable===key?2.5:1.2;
      bg.style.strokeOpacity = hoverTable===key?1:0.6;
    }
    g.style.filter = hoverTable===key?"url(#glow)":"none";
  });

  rEls.forEach((e,i) => {
    if (!e) return;
    const {rel,path,dot,lbl,lblBg,hit,cardLbl,cardBg,fc,tc,isDashed} = e;
    const [fSide, tSide] = bestSides(rel.from, rel.to);
    const f = anchor(rel.from, rel.fCol, fSide);
    const t = anchor(rel.to, rel.tCol, tSide);
    const d = bezier(f, t, fSide, tSide);
    const hi = hoverTable && (rel.from===hoverTable||rel.to===hoverTable);
    const hl = hoverRel===i;
    const dim = (hoverTable && !hi) || (searchTerm && !searchMatches.has(rel.from) && !searchMatches.has(rel.to));

    path.setAttribute("d",d); hit.setAttribute("d",d);
    path.style.stroke = hl?"#fff":dim?"#111320":fc;
    path.style.strokeWidth = hi||hl?2.8:1.2;
    if (!isDashed) path.setAttribute("stroke-dasharray", dim?"4 4":"none");
    path.style.opacity = dim?0.06:hl?0.9:0.5;
    dot.setAttribute("cx",t.x); dot.setAttribute("cy",t.y);
    dot.setAttribute("r", hi?4.5:3.5);
    dot.style.fill = dim?"#111320":tc;
    dot.style.opacity = dim?0.06:0.7;

    // Cardinality pill — always visible on line midpoint when not dimmed
    const mid = midpoint(f, t);
    const cardText = rel.card || "";
    const cardW = cardText.length * 6.5 + 10;
    cardLbl.setAttribute("x", mid.x);
    cardLbl.setAttribute("y", mid.y + 3);
    cardBg.setAttribute("x", mid.x - cardW/2);
    cardBg.setAttribute("y", mid.y - 8);
    cardBg.setAttribute("width", cardW);
    cardBg.setAttribute("height", 16);
    const showCard = !dim && cardText;
    cardLbl.style.opacity = showCard ? (hi||hl ? 1 : 0.7) : 0;
    cardBg.style.opacity = showCard ? (hi||hl ? 0.95 : 0.85) : 0;

    // Hover tooltip
    const mx = mid.x, my = mid.y - 18;
    lbl.setAttribute("x",mx); lbl.setAttribute("y",my);
    lbl.setAttribute("visibility", hl?"visible":"hidden");
    if (hl) {
      const text = `${rel.from}.${rel.fCol} → ${rel.to}.${rel.tCol}`;
      const tw = text.length * 5.6 + 20;
      lblBg.setAttribute("x",mx-tw/2); lblBg.setAttribute("y",my-13);
      lblBg.setAttribute("width",tw); lblBg.setAttribute("height",19);
      lblBg.setAttribute("visibility","visible");
    } else {
      lblBg.setAttribute("visibility","hidden");
    }
  });
}

function centerView() {
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  Object.entries(TABLES).forEach(([k,t])=>{
    const p=pos[k], h=thh(t);
    if(p.x<minX)minX=p.x; if(p.y<minY)minY=p.y;
    if(p.x+TW>maxX)maxX=p.x+TW; if(p.y+h>maxY)maxY=p.y+h;
  });
  const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  pan.x=window.innerWidth/2-cx*zoom;
  pan.y=window.innerHeight/2-cy*zoom;
}

buildLines();
buildTables();
centerView();
render();

// ── Mouse Events ──
svg.addEventListener("mousedown", e => {
  if (e.target===svg||e.target===bgR||e.target===gridR) {
    panning=true;
    panStart.x=e.clientX-pan.x; panStart.y=e.clientY-pan.y;
    svg.style.cursor="grabbing";
  }
});
window.addEventListener("mousemove", e => {
  if (dragging) {
    pos[dragging].x = (e.clientX-pan.x)/zoom - dragOff.x;
    pos[dragging].y = (e.clientY-pan.y)/zoom - dragOff.y;
    render();
  } else if (panning) {
    pan.x=e.clientX-panStart.x; pan.y=e.clientY-panStart.y;
    render();
  }
});
window.addEventListener("mouseup",()=>{
  dragging=null; panning=false; svg.style.cursor="default";
  Object.values(tEls).forEach(el => el.style.pointerEvents = "");
});
svg.addEventListener("wheel", e => {
  e.preventDefault();
  const oz=zoom;
  zoom=Math.min(2.0,Math.max(0.15,zoom-e.deltaY*0.001));
  const r=svg.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  pan.x=mx-(mx-pan.x)*(zoom/oz);
  pan.y=my-(my-pan.y)*(zoom/oz);
  render();
},{passive:false});

document.getElementById("bp").onclick=()=>{ zoom=Math.min(2.0,zoom+0.1); render(); };
document.getElementById("bm").onclick=()=>{ zoom=Math.max(0.15,zoom-0.1); render(); };
document.getElementById("br").onclick=()=>{
  zoom=0.52;
  Object.entries(TABLES).forEach(([k,t])=>{ pos[k]={x:t.x,y:t.y}; });
  centerView();
  render();
};

const searchInput = document.getElementById("search");
searchInput.addEventListener("input", e => {
  searchTerm = e.target.value.trim();
  render();
});
searchInput.addEventListener("keydown", e => {
  if (e.key==="Escape") { searchInput.value=""; searchTerm=""; render(); }
});
</script>
